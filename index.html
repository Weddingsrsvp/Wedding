<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wedding Experience Builder</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#d4af37;
}

body{
  margin:0;
  transition:0.5s ease;
  text-align:center;
  background:#0b0b10;
  color:#fff;
}

/* IMPORTANT FIX: prevent blank screen */
#app{
  display:none;
}

.container{
  max-width:600px;
  margin:auto;
  padding:20px;
}

/* =========================
   LANDING
========================= */
#selector{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:20px;
}

h1{
  color:var(--gold);
  font-size:32px;
  margin-bottom:10px;
}

.sub{
  opacity:0.6;
  margin-bottom:30px;
}

.cards{
  display:flex;
  flex-direction:column;
  gap:14px;
  max-width:420px;
  margin:auto;
}

.card{
  padding:18px;
  border-radius:16px;
  cursor:pointer;
  border:1px solid rgba(255,255,255,0.1);
  transition:0.3s;
  text-align:left;
}

.card:hover{
  transform:translateY(-3px);
}

.goldCard{
  background:linear-gradient(135deg,#1a1a1a,#2c2412);
}

.whiteCard{
  background:linear-gradient(135deg,#ffffff,#e8e8e8);
  color:#111;
}

.arabicCard{
  background:linear-gradient(135deg,#0e0e0e,#1b1b1b);
}

/* =========================
   APP (RSVP)
========================= */
#app{
  min-height:100vh;
  padding:30px 20px;
}

.box{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:18px;
  padding:20px;
  max-width:420px;
  margin:auto;
}

input,select{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  background:var(--gold);
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

/* =========================
   THEMES FIX
========================= */

body.gold{
  background:radial-gradient(circle at top,#1a1a1a,#000);
}

body.white{
  background:#f5f5f5;
  color:#111;
}

body.white .box{
  background:#fff;
  border:1px solid #ddd;
}

body.white button{
  background:#111;
  color:#fff;
}

body.arabic{
  background:linear-gradient(135deg,#0a0a0a,#1f1f1f);
}
</style>
</head>

<body>

<!-- =========================
     SELECTOR
========================= -->
<div id="selector">

  <h1>Wedding Experience</h1>
  <div class="sub">Choose your luxury theme</div>

  <div class="cards">

    <div class="card goldCard" onclick="start('gold')">
      ✨ Royal Gold<br><small>Luxury cinematic style</small>
    </div>

    <div class="card whiteCard" onclick="start('white')">
      🤍 Modern White<br><small>Clean elegant design</small>
    </div>

    <div class="card arabicCard" onclick="start('arabic')">
      🕌 Arabic Luxury<br><small>Traditional royal feel</small>
    </div>

  </div>
</div>

<!-- =========================
     APP
========================= -->
<div id="app">

  <div class="box">

    <h2>Wedding RSVP</h2>

    <input id="name" placeholder="Name / الاسم" />

    <select id="attend">
      <option value="Yes">Attending / نعم</option>
      <option value="No">Not Attending / لا</option>
      <option value="Maybe">Maybe / ربما</option>
    </select>

    <input id="guests" type="number" placeholder="Guests / عدد المرافقين" />

    <button onclick="send()">Send via WhatsApp</button>

  </div>

</div>

<script>
const phone = "13239259150";

/* =========================
   FIXED START SYSTEM
========================= */
function start(theme){

  // save choice
  localStorage.setItem("theme", theme);

  // apply theme
  document.body.className = theme;

  // switch screens safely
  document.getElementById("selector").style.display = "none";
  document.getElementById("app").style.display = "block";
}

/* =========================
   WHATSAPP RSVP
========================= */
function send(){

  const name = document.getElementById("name").value;
  const attend = document.getElementById("attend").value;
  const guests = document.getElementById("guests").value;

  const msg =
`Wedding RSVP:
Name: ${name}
Attendance: ${attend}
Guests: ${guests}`;

  window.open(
    `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,
    "_blank"
  );
}

/* =========================
   AUTO LOAD SAFE STATE
========================= */
window.onload = () => {

  const saved = localStorage.getItem("theme");

  if(saved){
    start(saved);
  } else {
    document.getElementById("selector").style.display = "flex";
    document.getElementById("app").style.display = "none";
  }
};
</script>

</body>
</html>
