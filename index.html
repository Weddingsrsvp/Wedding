<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wedding RSVP Ultra Luxury</title>

<style>
/* =========================
   BASE
========================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  transition: 0.5s ease;
  overflow-x: hidden;
}

/* =========================
   THEMES
========================= */
body.theme-dark {
  background: radial-gradient(circle at top, #1a1a1a, #000);
  color: white;
}

body.theme-gold {
  background: radial-gradient(circle at top, #1a140a, #000);
  color: #f5d06f;
}

body.theme-light {
  background: #f7f7f7;
  color: #111;
}

/* =========================
   SCREEN SYSTEM
========================= */
.screen {
  display: none;
  min-height: 100vh;
  justify-content: center;
  align-items: center;
  padding: 25px;
  animation: fade 0.5s ease;
}

.screen.active {
  display: flex;
}

@keyframes fade {
  from { opacity: 0; transform: scale(0.98); }
  to { opacity: 1; transform: scale(1); }
}

/* =========================
   TITLE
========================= */
.title {
  font-size: 26px;
  margin-bottom: 20px;
  letter-spacing: 1px;
  animation: glow 2.5s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 5px rgba(255,215,0,0.2); }
  to { text-shadow: 0 0 20px rgba(255,215,0,0.6); }
}

/* =========================
   CARDS
========================= */
.card {
  width: 100%;
  max-width: 420px;
  padding: 25px;
  border-radius: 22px;
  backdrop-filter: blur(18px);
  background: rgba(255,255,255,0.08);
  box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  text-align: center;
  transform: translateY(0);
  transition: 0.3s ease;
}

.card:hover {
  transform: translateY(-3px);
}

/* =========================
   INPUTS
========================= */
input, select {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border-radius: 12px;
  border: none;
  outline: none;
  font-size: 14px;
}

/* =========================
   BUTTONS
========================= */
button {
  width: 100%;
  padding: 12px;
  margin-top: 14px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-size: 15px;
  transition: 0.2s ease;
}

button:active {
  transform: scale(0.96);
}

.primary {
  background: gold;
  color: black;
  font-weight: bold;
}

.secondary {
  background: #222;
  color: white;
}

/* =========================
   THEME BUTTONS
========================= */
.theme-btn {
  margin: 10px 0;
  padding: 14px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-size: 15px;
  width: 100%;
}

/* =========================
   GLASS THEME FIXES
========================= */
body.theme-light .card {
  background: white;
}

body.theme-dark .card {
  border: 1px solid #333;
}

body.theme-gold .card {
  border: 1px solid rgba(245, 208, 111, 0.4);
}

/* =========================
   CONFETTI CANVAS
========================= */
#confetti {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 999;
}
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<!-- =========================
   THEME SCREEN
========================= -->
<div id="themeScreen" class="screen active">
  <div class="card">
    <div class="title">Choose Your Luxury Theme</div>

    <button class="theme-btn" onclick="selectTheme('theme-dark')">Midnight Black Luxury</button>
    <button class="theme-btn" onclick="selectTheme('theme-gold')">Royal Gold Luxury</button>
    <button class="theme-btn" onclick="selectTheme('theme-light')">Elegant White Clean</button>
  </div>
</div>

<!-- =========================
   RSVP SCREEN
========================= -->
<div id="rsvpScreen" class="screen">
  <div class="card">

    <div class="title">Wedding RSVP</div>

    <input id="name" placeholder="Name / الاسم" />
    
    <select id="attending">
      <option value="Yes">Attending / نعم</option>
      <option value="No">Not Attending / لا</option>
    </select>

    <input id="guests" type="number" placeholder="Guests / عدد المرافقين" />

    <button class="primary" onclick="sendRSVP()">Send via WhatsApp</button>
    <button class="secondary" onclick="back()">← Back</button>

  </div>
</div>

<script>
let currentTheme = "theme-dark";

/* =========================
   THEME SELECT
========================= */
function selectTheme(theme) {
  currentTheme = theme;
  document.body.className = theme;

  document.getElementById("themeScreen").classList.remove("active");
  document.getElementById("rsvpScreen").classList.add("active");
}

/* =========================
   BACK
========================= */
function back() {
  document.getElementById("rsvpScreen").classList.remove("active");
  document.getElementById("themeScreen").classList.add("active");
}

/* =========================
   WHATSAPP
========================= */
function sendRSVP() {
  const name = document.getElementById("name").value;
  const attending = document.getElementById("attending").value;
  const guests = document.getElementById("guests").value;

  const msg =
`💍 Wedding RSVP
Name: ${name}
Attending: ${attending}
Guests: ${guests}`;

  window.open("https://wa.me/?text=" + encodeURIComponent(msg), "_blank");

  launchConfetti();
}

/* =========================
   CONFETTI (SIMPLE LUXURY EFFECT)
========================= */
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let pieces = [];

function launchConfetti() {
  pieces = [];
  for (let i = 0; i < 120; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: Math.random() * -canvas.height,
      r: Math.random() * 6 + 2,
      d: Math.random() * 2 + 1,
      color: Math.random() > 0.5 ? "gold" : "white"
    });
  }
  requestAnimationFrame(draw);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  pieces.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    p.y += p.d * 4;
  });

  if (pieces[0]?.y < canvas.height) {
    requestAnimationFrame(draw);
  }
}
</script>

</body>
</html>
