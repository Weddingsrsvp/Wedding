<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wedding RSVP</title>

<style>
/* =========================
   BASE RESET
========================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  transition: 0.4s ease;
}

/* =========================
   THEMES
========================= */
body.theme-dark {
  background: #0f0f0f;
  color: white;
}

body.theme-gold {
  background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
  color: gold;
}

body.theme-light {
  background: #ffffff;
  color: #111;
}

/* =========================
   LAYOUT
========================= */
.container {
  display: none;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.active {
  display: flex;
}

/* =========================
   THEME SELECTOR
========================= */
#themeSelector {
  flex-direction: column;
  gap: 15px;
  text-align: center;
}

.theme-btn {
  padding: 15px 20px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-size: 16px;
}

/* =========================
   RSVP CARD (LUXURY GLASS)
========================= */
.rsvp-card {
  width: 100%;
  max-width: 420px;
  padding: 25px;
  border-radius: 20px;
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.08);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  text-align: center;
}

/* Inputs */
input, select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
}

/* Buttons */
button {
  margin-top: 15px;
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
}

/* Back button */
.back-btn {
  background: #333;
  color: white;
}

/* Send button */
.send-btn {
  background: gold;
  color: black;
  font-weight: bold;
}

/* =========================
   TEXT STYLES PER THEME
========================= */
body.theme-light .rsvp-card {
  background: #f5f5f5;
}

body.theme-gold .rsvp-card {
  border: 1px solid gold;
}

body.theme-dark .rsvp-card {
  border: 1px solid #444;
}
</style>
</head>

<body>

<!-- =========================
     THEME SELECTOR SCREEN
========================= -->
<div id="themeSelector" class="container active">
  <h2>Select Theme</h2>

  <button class="theme-btn" onclick="openTheme('theme-dark')">Dark Luxury</button>
  <button class="theme-btn" onclick="openTheme('theme-gold')">Gold Luxury</button>
  <button class="theme-btn" onclick="openTheme('theme-light')">Clean White</button>
</div>

<!-- =========================
     RSVP SCREEN
========================= -->
<div id="rsvpContainer" class="container">
  <div class="rsvp-card">

    <h2>Wedding RSVP</h2>

    <input id="name" placeholder="Name / الاسم" />

    <select id="attending">
      <option value="Yes">Attending / نعم</option>
      <option value="No">Not Attending / لا</option>
    </select>

    <input id="guests" type="number" placeholder="Guests / عدد المرافقين" />

    <button class="send-btn" onclick="sendWhatsApp()">Send via WhatsApp</button>

    <button class="back-btn" onclick="backToThemes()">← Back to Themes</button>

  </div>
</div>

<script>
function openTheme(theme) {
  document.body.className = theme;

  document.getElementById("themeSelector").classList.remove("active");
  document.getElementById("rsvpContainer").classList.add("active");
}

function backToThemes() {
  document.getElementById("rsvpContainer").classList.remove("active");
  document.getElementById("themeSelector").classList.add("active");
}

/* WhatsApp sender */
function sendWhatsApp() {
  const name = document.getElementById("name").value;
  const attending = document.getElementById("attending").value;
  const guests = document.getElementById("guests").value;

  const message =
`Wedding RSVP:
Name: ${name}
Attending: ${attending}
Guests: ${guests}`;

  const url = "https://wa.me/?text=" + encodeURIComponent(message);
  window.open(url, "_blank");
}
</script>

</body>
</html>
