<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wedding Experience Selector</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:"Cairo",sans-serif;
  background:#0b0b10;
  color:#fff;
  text-align:center;
}

/* LANDING */
#selector{
  padding:40px 20px;
}

h1{
  font-size:32px;
  color:#d4af37;
}

.cards{
  display:flex;
  flex-direction:column;
  gap:15px;
  max-width:400px;
  margin:30px auto;
}

.card{
  padding:20px;
  border-radius:15px;
  cursor:pointer;
  transition:0.3s;
  border:1px solid rgba(255,255,255,0.1);
}

.card:hover{
  transform:scale(1.03);
}

.gold{background:linear-gradient(135deg,#1a1a1a,#3a2f1b);}
.white{background:linear-gradient(135deg,#ffffff,#cfcfcf); color:#000;}
.arabic{background:linear-gradient(135deg,#0e0e0e,#1b1b1b);}

/* WEDDING APP */
#app{
  display:none;
  padding:20px;
}

h2{
  color:#d4af37;
}

input,select{
  width:90%;
  padding:12px;
  margin:8px;
  border-radius:10px;
  border:none;
}

button{
  width:90%;
  padding:12px;
  background:#d4af37;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.topbar{
  margin-bottom:20px;
  opacity:0.7;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- THEME SELECTOR -->
<div id="selector">
  <h1>Choose Your Wedding Experience</h1>

  <div class="cards">

    <div class="card gold" onclick="start('gold')">
      ✨ Royal Gold<br><small>Luxury palace style</small>
    </div>

    <div class="card white" onclick="start('white')">
      🤍 Modern White<br><small>Clean elegant design</small>
    </div>

    <div class="card arabic" onclick="start('arabic')">
      🕌 Arabic Luxury<br><small>Traditional royal feel</small>
    </div>

  </div>
</div>

<!-- APP -->
<div id="app">

  <div class="topbar" onclick="back()">← Back to Themes</div>

  <h2>Wedding RSVP</h2>

  <input id="name" placeholder="Name / الاسم" />

  <select id="attend">
    <option value="Yes">Attending / نعم</option>
    <option value="No">Not Attending / لا</option>
    <option value="Maybe">Maybe / ربما</option>
  </select>

  <input id="guests" type="number" placeholder="Guests / عدد المرافقين" />

  <button onclick="send()">Send via WhatsApp</button>

</div>

<script>
const phone = "13239259150";

/* START THEME */
function start(theme){
  localStorage.setItem("theme", theme);
  document.getElementById("selector").style.display="none";
  document.getElementById("app").style.display="block";
}

/* BACK */
function back(){
  document.getElementById("selector").style.display="block";
  document.getElementById("app").style.display="none";
}

/* WHATSAPP */
function send(){
  const name = document.getElementById("name").value;
  const attend = document.getElementById("attend").value;
  const guests = document.getElementById("guests").value;

  const msg =
`Wedding RSVP:
Name: ${name}
Attendance: ${attend}
Guests: ${guests}`;

  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,"_blank");
}

/* auto load theme */
window.onload = () => {
  const saved = localStorage.getItem("theme");
  if(saved){
    start(saved);
  }
}
</script>

</body>
</html>
