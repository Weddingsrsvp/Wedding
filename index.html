<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wedding Experience | Luxury Edition</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
:root{
  --gold:#d4af37;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  transition:0.6s ease;
  overflow-x:hidden;
}

/* =========================
   GLOBAL LAYOUT
========================= */
.page{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  text-align:center;
}

.hidden{display:none;}

/* =========================
   GLASS CARD
========================= */
.card{
  width:100%;
  max-width:420px;
  padding:22px;
  border-radius:22px;
  backdrop-filter: blur(18px);
  border:1px solid rgba(255,255,255,0.12);
  animation:fadeUp 0.8s ease;
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* =========================
   LANDING
========================= */
.title{
  font-size:30px;
  font-weight:700;
  margin-bottom:8px;
}

.subtitle{
  opacity:0.6;
  margin-bottom:25px;
}

.option{
  padding:16px;
  border-radius:16px;
  margin:10px 0;
  cursor:pointer;
  transition:0.3s;
  text-align:left;
  border:1px solid rgba(255,255,255,0.1);
}

.option:hover{
  transform:scale(1.02);
}

/* =========================
   INPUTS
========================= */
input,select{
  width:100%;
  padding:14px;
  margin:8px 0;
  border-radius:12px;
  border:none;
  outline:none;
  font-size:14px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
  margin-top:10px;
}

/* =========================
   THEMES
========================= */

/* GOLD - CINEMATIC LUXURY */
body.gold{
  background:radial-gradient(circle at top,#1a1a1a,#000);
  color:#fff;
  font-family:"Playfair Display",serif;
}

body.gold button{
  background:linear-gradient(135deg,#d4af37,#f5e6a4);
  color:#000;
}

/* WHITE - MODERN LUXURY */
body.white{
  background:#f6f6f6;
  color:#111;
  font-family:"Inter",sans-serif;
}

body.white .card{
  background:#fff;
  border:1px solid #ddd;
}

body.white button{
  background:#111;
  color:#fff;
}

/* ARABIC - ROYAL DARK */
body.arabic{
  background:linear-gradient(135deg,#0a0a0a,#1f1f1f);
  color:#fff;
  font-family:"Cairo",sans-serif;
}

/* =========================
   QR BOX
========================= */
#qr{
  margin-top:15px;
  display:flex;
  justify-content:center;
}
</style>
</head>

<body>

<!-- =========================
   LANDING
========================= -->
<div id="selector" class="page">
  <div class="card">

    <div class="title">Wedding Experience</div>
    <div class="subtitle">Choose your luxury theme</div>

    <div class="option" onclick="start('gold')">✨ Royal Gold<br><small>cinematic luxury experience</small></div>
    <div class="option" onclick="start('white')">🤍 Modern White<br><small>clean premium UI</small></div>
    <div class="option" onclick="start('arabic')">🕌 Arabic Luxury<br><small>royal traditional style</small></div>

  </div>
</div>

<!-- =========================
   APP
========================= -->
<div id="app" class="page hidden">
  <div class="card">

    <div class="title">Wedding RSVP</div>

    <input id="name" placeholder="Name / الاسم">
    
    <select id="attend">
      <option value="Yes">Attending / نعم</option>
      <option value="No">Not Attending / لا</option>
      <option value="Maybe">Maybe / ربما</option>
    </select>

    <input id="guests" type="number" placeholder="Guests / عدد المرافقين">

    <button onclick="send()">Send via WhatsApp</button>

    <div id="qr"></div>

  </div>
</div>

<script>
const phone = "13239259150";

/* =========================
   START SYSTEM (NO FLICKER)
========================= */
function start(theme){
  localStorage.setItem("theme", theme);
  document.body.className = theme;

  document.getElementById("selector").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  generateQR();
}

/* =========================
   WHATSAPP
========================= */
function send(){

  const name = document.getElementById("name").value;
  const attend = document.getElementById("attend").value;
  const guests = document.getElementById("guests").value;

  const msg =
`Wedding RSVP:
Name: ${name}
Attendance: ${attend}
Guests: ${guests}`;

  window.open(
    `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,
    "_blank"
  );
}

/* =========================
   QR CODE (DYNAMIC)
========================= */
function generateQR(){
  const qr = document.getElementById("qr");
  qr.innerHTML = "";
  new QRCode(qr, {
    text: window.location.href,
    width: 140,
    height: 140
  });
}

/* =========================
   AUTO LOAD SAFE STATE
========================= */
window.onload = () => {

  const saved = localStorage.getItem("theme");

  if(saved === "gold" || saved === "white" || saved === "arabic"){
    start(saved);
  }
};
</script>

</body>
</html>
