<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cinematic Wedding RSVP</title>

<style>
/* =========================
   BASE RESET
========================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  overflow-x: hidden;
}

/* =========================
   CINEMATIC BACKGROUND
========================= */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,215,0,0.12), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(255,255,255,0.06), transparent 50%),
    linear-gradient(135deg, #0a0a0a, #000);
  z-index: -1;
}

/* glow */
.glow {
  position: fixed;
  width: 300px;
  height: 300px;
  background: gold;
  filter: blur(120px);
  opacity: 0.12;
  top: 15%;
  left: 10%;
}

/* =========================
   SCREEN SYSTEM
========================= */
.screen {
  display: none;
  min-height: 100vh;
  justify-content: center;
  align-items: center;
  padding: 25px;
}

.screen.active {
  display: flex;
}

/* =========================
   CARD
========================= */
.card {
  width: 100%;
  max-width: 450px;
  padding: 28px;
  border-radius: 22px;
  backdrop-filter: blur(22px);
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,215,0,0.2);
  box-shadow: 0 25px 70px rgba(0,0,0,0.6);
  text-align: center;
  color: white;
}

/* =========================
   TITLE
========================= */
h1 {
  font-size: 26px;
  margin-bottom: 10px;
  letter-spacing: 1px;
}

p {
  opacity: 0.7;
  margin-bottom: 15px;
}

/* =========================
   INPUTS
========================= */
input, select {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border-radius: 12px;
  border: none;
  outline: none;
  font-size: 14px;
  background: rgba(255,255,255,0.1);
  color: white;
}

/* =========================
   BUTTONS
========================= */
button {
  width: 100%;
  padding: 14px;
  margin-top: 14px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-size: 15px;
  transition: 0.2s ease;
}

button:active {
  transform: scale(0.97);
}

.primary {
  background: linear-gradient(90deg, gold, #ffdf70);
  color: black;
  font-weight: bold;
}

.secondary {
  background: rgba(255,255,255,0.1);
  color: white;
}

/* =========================
   SIMPLE LAYOUT FIX
========================= */
.small {
  font-size: 13px;
  opacity: 0.6;
  margin-top: 8px;
}
</style>
</head>

<body>

<div class="glow"></div>

<!-- =========================
   HERO SCREEN
========================= -->
<div id="hero" class="screen active">
  <div class="card">
    <h1>Wedding Invitation</h1>
    <p>Tap to enter the experience</p>
    <button class="primary" onclick="enter()">Enter</button>
  </div>
</div>

<!-- =========================
   RSVP SCREEN
========================= -->
<div id="rsvp" class="screen">
  <div class="card">

    <h1>RSVP</h1>
    <p class="small">We look forward to celebrating with you</p>

    <input id="name" placeholder="Name / الاسم" />

    <select id="attending">
      <option value="Yes">Attending / نعم</option>
      <option value="No">Not Attending / لا</option>
    </select>

    <input id="guests" type="number" placeholder="Guests / عدد المرافقين" />

    <button class="primary" onclick="send()">Send via WhatsApp</button>
    <button class="secondary" onclick="back()">← Back</button>

  </div>
</div>

<script>
/* =========================
   NAVIGATION FIXED
========================= */
function enter() {
  document.getElementById("hero").classList.remove("active");
  document.getElementById("rsvp").classList.add("active");
}

function back() {
  document.getElementById("rsvp").classList.remove("active");
  document.getElementById("hero").classList.add("active");
}

/* =========================
   WHATSAPP SEND
========================= */
function send() {
  const name = document.getElementById("name").value;
  const attending = document.getElementById("attending").value;
  const guests = document.getElementById("guests").value;

  const msg =
`💍 Wedding RSVP
Name: ${name}
Attending: ${attending}
Guests: ${guests}`;

  window.open("https://wa.me/?text=" + encodeURIComponent(msg), "_blank");
}
</script>

</body>
</html>
