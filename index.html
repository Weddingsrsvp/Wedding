<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دعوة زفاف</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Cairo:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  font-family: 'Cairo', sans-serif;
  color: gold;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;

  /* cinematic background */
  background: url('https://images.unsplash.com/photo-1520854221256-17451cc331bf?auto=format&fit=crop&w=1950&q=80') center/cover no-repeat;
}

/* dark luxury overlay */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.65);
}

.card {
  position: relative;
  padding: 40px 25px;
  max-width: 700px;
  border: 1px solid rgba(255,215,0,0.4);
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(6px);
  border-radius: 20px;
  box-shadow: 0 0 40px rgba(255,215,0,0.15);
}

.names {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  margin-bottom: 20px;
  letter-spacing: 1px;
}

.title {
  font-size: 40px;
  margin-bottom: 15px;
  font-weight: 600;
}

.subtext {
  font-size: 18px;
  margin-bottom: 25px;
  color: #f5e6b1;
  line-height: 1.8;
}

.countdown {
  font-size: 20px;
  margin-top: 20px;
  color: gold;
  letter-spacing: 2px;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="card">

  <!-- 🔥 Names go here -->
  <div class="names">
    [اسم العريس] ❤️ [اسم العروس]
  </div>

  <!-- removed basmala as requested -->

  <div class="title">
    دعوة لحضور حفل زفافنا
  </div>

  <div class="subtext">
    بكل الحب ندعوكم لمشاركتنا أجمل لحظات حياتنا<br>
    حضوركم شرف وسعادة لنا
  </div>

  <!-- optional countdown placeholder -->
  <div class="countdown">
    17 يوم | 14 ساعة | 32 دقيقة
  </div>

</div>

</body>
</html>
