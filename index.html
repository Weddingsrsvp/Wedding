<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wedding Experience Builder</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter, sans-serif;
  transition:0.5s ease;
  background:#0b0b10;
  color:#fff;
}

/* IMPORTANT: default state */
#app{
  display:none;
}

/* =========================
   LANDING
========================= */
#selector{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
}

h1{
  color:#d4af37;
  margin-bottom:10px;
}

.sub{
  opacity:0.6;
  margin-bottom:25px;
}

.card{
  width:100%;
  max-width:350px;
  padding:16px;
  margin:10px 0;
  border-radius:14px;
  cursor:pointer;
  transition:0.3s;
  border:1px solid rgba(255,255,255,0.1);
  text-align:left;
}

.card:hover{
  transform:scale(1.02);
}

.goldCard{background:linear-gradient(135deg,#1a1a1a,#2c2412);}
.whiteCard{background:#fff; color:#111;}
.arabicCard{background:linear-gradient(135deg,#0e0e0e,#1b1b1b);}

/* =========================
   APP
========================= */
#app{
  min-height:100vh;
  padding:30px 20px;
  text-align:center;
}

.box{
  max-width:400px;
  margin:auto;
  background:rgba(255,255,255,0.06);
  padding:20px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.1);
}

input,select{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#d4af37;
  font-weight:bold;
  cursor:pointer;
}

/* =========================
   THEMES
========================= */
body.gold{
  background:radial-gradient(circle at top,#1a1a1a,#000);
}

body.white{
  background:#f5f5f5;
  color:#111;
}

body.white .box{
  background:#fff;
  border:1px solid #ddd;
}

body.white button{
  background:#111;
  color:#fff;
}

body.arabic{
  background:linear-gradient(135deg,#0a0a0a,#1f1f1f);
}
</style>
</head>

<body>

<!-- =========================
     SELECTOR SCREEN
========================= -->
<div id="selector">

  <h1>Wedding Experience</h1>
  <div class="sub">Choose your luxury theme</div>

  <div class="card goldCard" onclick="start('gold')">
    ✨ Royal Gold<br><small>Luxury cinematic style</small>
  </div>

  <div class="card whiteCard" onclick="start('white')">
    🤍 Modern White<br><small>Clean elegant design</small>
  </div>

  <div class="card arabicCard" onclick="start('arabic')">
    🕌 Arabic Luxury<br><small>Traditional royal feel</small>
  </div>

</div>

<!-- =========================
     RSVP SCREEN
========================= -->
<div id="app">

  <div class="box">

    <h2>Wedding RSVP</h2>

    <input id="name" placeholder="Name / الاسم" />

    <select id="attend">
      <option value="Yes">Attending / نعم</option>
      <option value="No">Not Attending / لا</option>
      <option value="Maybe">Maybe / ربما</option>
    </select>

    <input id="guests" type="number" placeholder="Guests / عدد المرافقين" />

    <button onclick="send()">Send via WhatsApp</button>

  </div>

</div>

<!-- =========================
     JAVASCRIPT (FIXED)
========================= -->
<script>
const phone = "13239259150";

/* SWITCH SCREEN */
function start(theme){

  localStorage.setItem("theme", theme);

  document.body.className = theme;

  document.getElementById("selector").style.display = "none";
  document.getElementById("app").style.display = "block";
}

/* WHATSAPP SEND */
function send(){

  const name = document.getElementById("name").value;
  const attend = document.getElementById("attend").value;
  const guests = document.getElementById("guests").value;

  const msg =
`Wedding RSVP:
Name: ${name}
Attendance: ${attend}
Guests: ${guests}`;

  window.open(
    `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,
    "_blank"
  );
}

/* IMPORTANT FIX: NO AUTO SWITCHING */
window.onload = () => {

  // ALWAYS start on selector
  document.getElementById("selector").style.display = "flex";
  document.getElementById("app").style.display = "none";

  // ONLY apply theme visuals (no screen jump)
  const saved = localStorage.getItem("theme");

  if(saved){
    document.body.className = saved;
  }
};
</script>

</body>
</html>
