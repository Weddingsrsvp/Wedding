<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cinematic RSVP V5</title>

<style>
/* =========================
   DESIGN TOKENS (SINGLE SOURCE OF TRUTH)
========================= */
:root {
  --bg1: #0a0a0a;
  --bg2: #000;
  --gold: #d6b25e;
  --text: #ffffff;
  --glass: rgba(255,255,255,0.06);
}

/* =========================
   BASE RESET
========================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: radial-gradient(circle at top, var(--bg1), var(--bg2));
  color: var(--text);
  overflow-x: hidden;
}

/* =========================
   BACKGROUND LAYERS
========================= */
.glow {
  position: fixed;
  width: 400px;
  height: 400px;
  background: var(--gold);
  filter: blur(140px);
  opacity: 0.12;
  top: 10%;
  left: 10%;
  z-index: 0;
}

/* =========================
   APP CONTAINER
========================= */
#app {
  position: relative;
  z-index: 1;
}

/* =========================
   SCREENS (ROUTER SYSTEM)
========================= */
.screen {
  display: none;
  min-height: 100vh;
  justify-content: center;
  align-items: center;
  padding: 24px;
}

.screen.active {
  display: flex;
}

/* =========================
   CARD SYSTEM
========================= */
.card {
  width: 100%;
  max-width: 460px;
  padding: 30px;
  border-radius: 24px;
  background: var(--glass);
  backdrop-filter: blur(22px);
  border: 1px solid rgba(214,178,94,0.25);
  box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  text-align: center;
}

/* =========================
   TYPOGRAPHY
========================= */
h1 {
  font-size: 28px;
  margin-bottom: 10px;
  letter-spacing: 1px;
}

p {
  opacity: 0.7;
  margin-bottom: 16px;
}

/* =========================
   INPUTS
========================= */
input, select {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border-radius: 14px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.08);
  color: white;
}

/* =========================
   BUTTONS
========================= */
button {
  width: 100%;
  padding: 14px;
  margin-top: 14px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  transition: 0.2s ease;
}

button:active {
  transform: scale(0.97);
}

.primary {
  background: linear-gradient(90deg, var(--gold), #f2d58a);
  color: black;
  font-weight: bold;
}

.secondary {
  background: rgba(255,255,255,0.08);
  color: white;
}

/* =========================
   SMALL TEXT
========================= */
.small {
  font-size: 13px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="glow"></div>

<div id="app">

  <!-- =========================
       HERO SCREEN
  ========================== -->
  <div id="screen-hero" class="screen active">
    <div class="card">
      <h1>Wedding Invitation</h1>
      <p>Experience begins here</p>
      <button class="primary" onclick="go('rsvp')">Enter</button>
    </div>
  </div>

  <!-- =========================
       RSVP SCREEN
  ========================== -->
  <div id="screen-rsvp" class="screen">
    <div class="card">

      <h1>RSVP</h1>
      <p class="small">We look forward to celebrating with you</p>

      <input id="name" placeholder="Name / الاسم" />

      <select id="attending">
        <option value="Yes">Attending / نعم</option>
        <option value="No">Not Attending / لا</option>
      </select>

      <input id="guests" type="number" placeholder="Guests / عدد المرافقين" />

      <button class="primary" onclick="send()">Send via WhatsApp</button>
      <button class="secondary" onclick="go('hero')">Back</button>

    </div>
  </div>

</div>

<script>

/* =========================
   STATE ROUTER (CORE ARCHITECTURE)
========================= */
const state = {
  screen: "hero"
};

/* =========================
   SCREEN CONTROLLER (ONLY ONE PLACE CONTROLS UI)
========================= */
function go(screen) {
  state.screen = screen;

  document.querySelectorAll(".screen").forEach(s => {
    s.classList.remove("active");
  });

  document.getElementById("screen-" + screen).classList.add("active");
}

/* =========================
   WHATSAPP SUBMISSION
========================= */
function send() {
  const name = document.getElementById("name").value;
  const attending = document.getElementById("attending").value;
  const guests = document.getElementById("guests").value;

  const message =
`💍 Wedding RSVP
Name: ${name}
Attending: ${attending}
Guests: ${guests}`;

  window.open("https://wa.me/?text=" + encodeURIComponent(message), "_blank");
}

</script>

</body>
</html>
