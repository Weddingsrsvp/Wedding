<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>دعوة زفاف فاخرة</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: "Cairo", sans-serif;
  background: black;
  color: white;
  overflow-x: hidden;
}

/* Luxury background */
.hero {
  height: 100vh;
  width: 100%;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  background: url('https://images.unsplash.com/photo-1523438097201-512ae7d59c4a?auto=format&fit=crop&w=2000&q=80') center/cover no-repeat;
}

/* cinematic overlay */
.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, rgba(0,0,0,0.2), rgba(0,0,0,0.85));
}

/* gold glow effect */
.glow {
  position: absolute;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(212,175,55,0.25), transparent 70%);
  filter: blur(40px);
  top: 20%;
  left: 50%;
  transform: translateX(-50%);
}

.content {
  position: relative;
  z-index: 2;
  max-width: 800px;
  padding: 20px;
}

h1 {
  font-family: "Playfair Display", serif;
  font-size: 48px;
  color: #d4af37;
  letter-spacing: 2px;
  text-shadow: 0 0 25px rgba(212,175,55,0.5);
}

.subtitle {
  margin-top: 15px;
  font-size: 20px;
  color: #f5f5f5;
}

.timer {
  margin-top: 25px;
  font-size: 22px;
  color: #d4af37;
  letter-spacing: 1px;
}

/* RSVP section */
.rsvp {
  background: #0a0a0a;
  padding: 80px 20px;
  text-align: center;
}

.rsvp h2 {
  font-size: 32px;
  color: #d4af37;
  margin-bottom: 30px;
  font-family: "Playfair Display", serif;
}

form {
  max-width: 500px;
  margin: auto;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

input, select, textarea {
  padding: 12px;
  border: 1px solid rgba(212,175,55,0.4);
  background: rgba(255,255,255,0.05);
  color: white;
  border-radius: 8px;
  outline: none;
}

button {
  padding: 14px;
  background: linear-gradient(135deg, #d4af37, #b88a2a);
  border: none;
  color: black;
  font-weight: bold;
  cursor: pointer;
  border-radius: 8px;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.03);
}

/* small gold line */
.divider {
  width: 120px;
  height: 2px;
  background: #d4af37;
  margin: 20px auto;
}
</style>
</head>

<body>

<div class="hero">
  <div class="glow"></div>

  <div class="content">
    <h1>دعوة لحضور حفل زفافنا</h1>
    <div class="divider"></div>

    <div class="subtitle">
      بكل الحب ندعوكم لمشاركتنا أجمل لحظات حياتنا
    </div>

    <div class="timer" id="timer">
      00 يوم 00 ساعة 00 دقيقة 00 ثانية
    </div>
  </div>
</div>

<div class="rsvp">
  <h2>تأكيد الحضور (RSVP)</h2>

  <form id="rsvpForm">
    <input type="text" id="name" placeholder="الاسم الكامل" required>

    <select id="attendance" required>
      <option value="">هل ستحضر؟</option>
      <option value="نعم">نعم سأحضر</option>
      <option value="لا">لن أستطيع الحضور</option>
    </select>

    <input type="number" id="guests" placeholder="عدد المرافقين" min="0">

    <textarea id="message" placeholder="رسالة تهنئة (اختياري)"></textarea>

    <button type="submit">إرسال عبر واتساب</button>
  </form>
</div>

<script>
// ===== COUNTDOWN TIMER =====
const weddingDate = new Date("2026-12-31T00:00:00").getTime();

function updateTimer() {
  const now = new Date().getTime();
  const diff = weddingDate - now;

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((diff % (1000 * 60)) / 1000);

  document.getElementById("timer").innerHTML =
    `${days} يوم ${hours} ساعة ${minutes} دقيقة ${seconds} ثانية`;
}

setInterval(updateTimer, 1000);
updateTimer();

// ===== RSVP WHATSAPP SEND =====
document.getElementById("rsvpForm").addEventListener("submit", function(e){
  e.preventDefault();

  const name = document.getElementById("name").value;
  const attendance = document.getElementById("attendance").value;
  const guests = document.getElementById("guests").value;
  const message = document.getElementById("message").value;

  const phoneNumber = "972500000000"; // 🔴 replace with your WhatsApp number

  const text =
`دعوة زفاف RSVP:
الاسم: ${name}
الحضور: ${attendance}
عدد المرافقين: ${guests}
رسالة: ${message}`;

  const url = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(text)}`;

  window.open(url, "_blank");
});
</script>

</body>
</html>
