<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Wedding Invitation</title>

    <meta name="description" content="Wedding Invitation">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Floating Particles -->
    <div class="particles"></div>

    <!-- Background -->
    <div class="background-overlay"></div>

    <!-- Palace Decorations -->
    <div class="left-column"></div>
    <div class="right-column"></div>

    <div class="chandelier"></div>

    <!-- Main Wrapper -->
    <main class="container">

        <!-- Hero -->
        <section class="hero">

            <div class="hero-content">

                <p class="small-title">
                    نتشرف بدعوتكم لحضور
                </p>

                <h1 class="couple-names">
                    <span id="groomName">اسم العريس</span>

                    <span class="heart">
                        ♥
                    </span>

                    <span id="brideName">
                        اسم العروس
                    </span>
                </h1>

                <p class="invitation-text">
                    بكل الحب والسعادة ندعوكم لمشاركتنا أجمل لحظات العمر
                    وحضور حفل زفافنا، حضوركم يسعدنا ويزيد فرحتنا.
                </p>

            </div>

        </section>

        <!-- Countdown -->

        <section class="countdown-section">

            <div class="countdown-title">
                العد التنازلي
            </div>

            <div id="countdown">

                <div class="time-box">

                    <span id="days">00</span>

                    <small>يوم</small>

                </div>

                <div class="time-box">

                    <span id="hours">00</span>

                    <small>ساعة</small>

                </div>

                <div class="time-box">

                    <span id="minutes">00</span>

                    <small>دقيقة</small>

                </div>

                <div class="time-box">

                    <span id="seconds">00</span>

                    <small>ثانية</small>

                </div>

            </div>

        </section>

        <!-- Event Details -->

        <section class="details">

            <div class="detail-card">

                <h3>📅 التاريخ</h3>

                <p id="weddingDateText">
                    20 ديسمبر 2026
                </p>

            </div>

            <div class="detail-card">

                <h3>🕐 الوقت</h3>

                <p id="weddingTime">
                    7:30 مساءً
                </p>

            </div>

            <div class="detail-card">

                <h3>📍 المكان</h3>

                <p id="venue">
                    قاعة الأفراح
                </p>

            </div>

        </section>

        <!-- RSVP -->

        <section class="rsvp">

            <h2>
                تأكيد الحضور
            </h2>

            <form id="rsvpForm">

                <input
                    type="text"
                    id="name"
                    placeholder="الاسم الكامل"
                    required>

                <input
                    type="tel"
                    id="phone"
                    placeholder="رقم الجوال"
                    required>

                <input
                    type="number"
                    id="guests"
                    placeholder="عدد المرافقين"
                    min="0">

                <textarea
                    id="message"
                    rows="4"
                    placeholder="رسالة اختيارية"></textarea>

                <button type="submit">

                    تأكيد عبر واتساب

                </button>

            </form>

        </section>

    </main>

    <script src="config.js"></script>
    <script src="script.js"></script>

</body>

</html>
